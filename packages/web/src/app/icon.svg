<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#1e293b"/>
  <!-- Glowing Hexagon Base -->
  <polygon points="50,15 85,35 85,75 50,95 15,75 15,35" fill="none" stroke="#06b6d4" stroke-width="6" opacity="0.3"/>
  <!-- Inner 3D Cube -->
  <g transform="translate(50,55)">
    <!-- Top Face -->
    <path d="M0,-30 L25,-15 L0,0 L-25,-15 Z" fill="#22d3ee" opacity="0.9"/>
    <!-- Left Face -->
    <path d="M-25,-15 L0,0 L0,30 L-25,15 Z" fill="#0891b2" opacity="0.9"/>
    <!-- Right Face -->
    <path d="M0,0 L25,-15 L25,15 L0,30 Z" fill="#0e7490" opacity="0.9"/>
    <!-- Center Highlight/Spark -->
    <circle cx="0" cy="-5" r="4" fill="#ffffff" filter="drop-shadow(0 0 4px #fff)"/>
  </g>
</svg>
